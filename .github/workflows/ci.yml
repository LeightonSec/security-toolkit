name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The toolkit is stdlib-only; requirements-dev.txt is CI tooling,
      # hash-pinned and compiled at the matrix floor (3.10, --universal) so
      # marker-gated transitives survive on every matrix leg.
      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run ruff
        run: ruff check .

      # -ll = medium+ severity. Runs over the adversarial test fixtures too —
      # verified clean; do not add excludes to make future findings vanish.
      - name: Run bandit
        run: bandit -r . -ll -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # pip-audit runs as an isolated tool, NOT a project dependency: an audit
      # tool must not pollute the dependency graph it audits. Dev deps are in
      # scope because dev-only CVEs are still CVEs.
      - name: Audit dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements-dev.txt --strict

      # security-gate is SHA-pinned (not a tag/@main): the gate moves fast and
      # a SHA is reproducible and bumped deliberately.
      - name: Install security-gate (SHA-pinned)
        run: pip install "git+https://github.com/LeightonSec/security-gate.git@c52a8b56b3e164f9854c646bedb5d9e70446d98e"

      # No --exclude: the whole tree, adversarial fixtures included, passes
      # the gate as-is (verified locally before wiring). Real teeth — blocks
      # on CRITICAL/HIGH.
      - name: Run security-gate
        run: security-gate scan . --output json --save

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-report
          path: security-gate-report.json
